# SOEN 345 — CI: unit tests + instrumented UI tests on emulator
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon

  instrumented-ui:
    # ubuntu-latest can move to newer images where emulator/KVM behaviour differs; 22.04 stays predictable for x86_64 + KVM.
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Required on Linux for HW-accelerated x86_64 images; without this, Espresso often hits
      # RootViewWithoutFocusException and the emulator can fail to boot cleanly.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Fail fast on compile errors and warm Gradle before the emulator step (shorter wall time under emulator-runner).
      - name: Assemble debug and androidTest APKs
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon --stacktrace

      - name: Run Espresso tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          # Omit custom profile: "pixel_6" is not guaranteed across cmdline-tools versions and can break AVD creation.
          disable-animations: true
          enable-hw-keyboard: false
          force-avd-creation: true
          emulator-boot-timeout: 900
          channel: stable
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: |
            adb shell wm dismiss-keyguard || true
            adb shell cmd statusbar collapse || true
            adb shell settings put global heads_up_notifications_enabled 0 || true
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true
            adb shell input keyevent 224 || true
            adb shell input keyevent 82 || true
            ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace
